name: Deploy Vue 3 to S3 + CloudFront

on:
  push:
    branches:
      - main   # ou a branch que você usa para produção

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate build version
        run: echo "VITE_SISFIN_FRONTEND_VERSION=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Show version
        run: |
          echo "Build version: $VITE_SISFIN_FRONTEND_VERSION"

      - name: Build Vue project
        run: npm run build
        env:
          VITE_SISFIN_FRONTEND_ENVIROMENT: ${{ secrets.VITE_SISFIN_FRONTEND_ENVIROMENT }}
          VITE_SISFIN_FRONTEND_VERSION: ${{ env.VITE_SISFIN_FRONTEND_VERSION }}
          VITE_SISFIN_BACKEND_URL_MAINTENANCE: ${{ secrets.VITE_SISFIN_BACKEND_URL_MAINTENANCE }}
          VITE_SISFIN_BACKEND_URL_TRANSACTION: ${{ secrets.VITE_SISFIN_BACKEND_URL_TRANSACTION }}
          VITE_SISFIN_BACKEND_URL_APP_START: ${{ secrets.VITE_SISFIN_BACKEND_URL_APP_START }}
          VITE_SISFIN_BACKEND_URL_APP_STOP: ${{ secrets.VITE_SISFIN_BACKEND_URL_APP_STOP }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync build folder to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000,public"

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
